version: "3.9"

services:

  redis:
    image: redis:7
    container_name: job-redis
    ports:
      - "6379:6379"
    restart: always

  postgres:
    image: postgres:15
    container_name: job-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobdb
    ports:
      - "5432:5432"
    restart: always